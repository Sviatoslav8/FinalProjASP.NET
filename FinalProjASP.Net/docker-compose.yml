version: '3.8'

services:
  webapi:
    image: finalproj-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres_db;Port=5432;Database=FinalProjDb;Username=postgres;Password=super_secret_password;
    depends_on:
      - postgres_db
    restart: always

  postgres_db:
    image: postgres:16-alpine
    container_name: postgres_container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: FinalProjDb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata: